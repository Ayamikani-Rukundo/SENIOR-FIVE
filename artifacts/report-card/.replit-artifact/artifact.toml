kind = "web"
previewPath = "/"
title = "Student Report Card"
version = "1.0.0"
id = "artifacts/report-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20403

[services.development]
run = "pnpm --filter @workspace/report-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/report-card", "run", "build" ]
publicDir = "artifacts/report-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20403"
BASE_PATH = "/"
